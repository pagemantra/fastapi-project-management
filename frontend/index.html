<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1890ff" />
    <meta name="description" content="Employee Work Tracking & Time Management System" />

    <!-- PWA Meta Tags -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Work Tracker" />
    <meta name="application-name" content="Work Tracker" />
    <meta name="msapplication-TileColor" content="#1890ff" />

    <!-- Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <title>Work Tracker</title>

    <style>
      /* PWA Install Prompt Styles - shown before React loads */
      .pwa-install-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      }
      .pwa-install-card {
        background: white;
        border-radius: 16px;
        padding: 40px;
        max-width: 450px;
        text-align: center;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        margin: 20px;
      }
      .pwa-install-card h1 {
        color: #1890ff;
        margin-bottom: 16px;
        font-size: 28px;
      }
      .pwa-install-card p {
        color: #666;
        margin-bottom: 24px;
        line-height: 1.6;
      }
      .pwa-install-btn {
        background: #1890ff;
        color: white;
        border: none;
        padding: 14px 32px;
        font-size: 16px;
        border-radius: 8px;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.3s;
      }
      .pwa-install-btn:hover {
        background: #40a9ff;
      }
      .pwa-install-steps {
        text-align: left;
        background: #f5f5f5;
        padding: 20px;
        border-radius: 8px;
        margin-top: 20px;
      }
      .pwa-install-steps h3 {
        margin-bottom: 12px;
        color: #333;
      }
      .pwa-install-steps ol {
        margin: 0;
        padding-left: 20px;
        color: #666;
      }
      .pwa-install-steps li {
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then((registration) => {
              console.log('[App] Service Worker registered:', registration.scope);
            })
            .catch((error) => {
              console.error('[App] Service Worker registration failed:', error);
            });
        });
      }
    </script>
  </body>
</html>
